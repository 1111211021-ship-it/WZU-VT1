<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 虛擬助教 - Polo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 修改 body 背景色為深灰色，防止載入時閃爍白底 */
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; touch-action: none; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 0; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        
        /* 隱藏滾動條但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.2.0/lib/three-vrm.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer" class="flex flex-col justify-end p-4 relative">
        
        <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 w-[calc(100%-2rem)] sm:w-full max-w-lg pointer-events-auto flex flex-col gap-3 bg-black/40 backdrop-blur-md p-4 rounded-2xl shadow-2xl border border-white/10 z-10 transition-all duration-300">
            
            <div id="chat-bubble" class="hidden px-2 max-h-40 overflow-y-auto no-scrollbar">
                <p id="chat-text" class="text-lg text-blue-100 font-medium leading-relaxed drop-shadow-sm"></p>
            </div>

            <div class="flex gap-2 w-full">
                <button id="mic-btn" class="bg-white/10 hover:bg-white/20 backdrop-blur text-blue-200 px-3 py-3 rounded-xl shadow-inner border border-white/10 transition-colors shrink-0 flex items-center justify-center" title="語音輸入">
                    <svg id="mic-icon" class
