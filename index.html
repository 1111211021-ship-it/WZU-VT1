<script type="module">
import * as THREE from 'three';
...

// --- 全域變數 ---
let scene, camera, renderer, controls;
let currentVrm = undefined;
let particles;
let floatingOrbs = []; // ✅ 新增
const clock = new THREE.Clock();

...

async function init() {
    const container = document.getElementById('canvas-container');

    await loadConfig();

    scene = new THREE.Scene();

    // ✅ 改為暗色背景
    scene.background = new THREE.Color(0x0f172a);
    scene.fog = new THREE.Fog(0x0f172a, 10, 50);

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    ...
}

function setupEnvironment() {

    ...

    // ✅ 地板改暗
    const floorMaterial = new THREE.MeshStandardMaterial({
        color: 0x1e293b,
        roughness: 0.7,
        metalness: 0.2
    });

    ...

    // ✅ Grid 改暗
    const gridHelper = new THREE.GridHelper(50, 100, 0x334155, 0x1e293b);

    ...

    // ✅ 底座改暗
    const pedestalMaterial = new THREE.MeshStandardMaterial({
        color: 0x111827,
        roughness: 0.5,
        metalness: 0.3
    });

    ...

    scene.add(particles);

    // =========================
    // ✅ 懸浮光球（新增）
    // =========================
    const orbCount = 12;

    for (let i = 0; i < orbCount; i++) {
        const geometry = new THREE.SphereGeometry(0.08, 16, 16);
        const material = new THREE.MeshStandardMaterial({
            color: new THREE.Color().setHSL(Math.random(), 0.7, 0.6),
            emissive: new THREE.Color().setHSL(Math.random(), 1.0, 0.5),
            emissiveIntensity: 1.5,
            transparent: true,
            opacity: 0.85
        });

        const orb = new THREE.Mesh(geometry, material);

        orb.position.set(
            (Math.random() - 0.5) * 6,
            Math.random() * 3 + 0.5,
            (Math.random() - 0.5) * 6
        );

        orb.userData = {
            speed: Math.random() * 0.5 + 0.2,
            offset: Math.random() * Math.PI * 2
        };

        scene.add(orb);
        floatingOrbs.push(orb);
    }
}

function animate() {
    requestAnimationFrame(animate);

    const delta = clock.getDelta();
    const time = clock.getElapsedTime();

    ...

    // 原粒子旋轉
    if (particles) particles.rotation.y += delta * 0.05;

    // =========================
    // ✅ 懸浮光球動畫（新增）
    // =========================
    floatingOrbs.forEach((orb) => {
        const t = time * orb.userData.speed + orb.userData.offset;

        // 漂浮
        orb.position.y += Math.sin(t) * 0.002;
        orb.position.x += Math.cos(t * 0.5) * 0.001;

        // 發光呼吸
        orb.material.emissiveIntensity =
            1.2 + Math.sin(t * 2) * 0.5;
    });

    ...

    renderer.render(scene, camera);
}
</script>
