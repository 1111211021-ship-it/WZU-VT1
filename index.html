<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 虛擬助教</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a202c; touch-action: none; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 0; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 新增：白字黑邊框樣式 */
        #chat-text {
            color: white;
            /* 使用多重 text-shadow 模擬黑邊效果 */
            text-shadow: 
                -1px -1px 0 #000,  
                 1px -1px 0 #000,
                -1px  1px 0 #000,
                 1px  1px 0 #000,
                 0px  2px 4px rgba(0,0,0,0.5);
        }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3.0.0/lib/three-vrm.module.js"
            }
        }
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer" class="flex flex-col justify-end p-4 relative">
        <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 w-[calc(100%-2rem)] sm:w-full max-w-lg pointer-events-auto flex flex-col gap-3 bg-white/10 backdrop-blur-sm p-4 rounded-2xl shadow-sm border border-white/30 z-10 transition-all duration-300">
            <div id="chat-bubble" class="hidden px-2 max-h-40 overflow-y-auto no-scrollbar">
                <!-- 修改：文字樣式已移至 CSS #chat-text 中 -->
                <p id="chat-text" class="text-xl font-bold leading-relaxed tracking-wide"></p>
            </div>
            <div class="flex gap-2 w-full">
                <button id="mic-btn" class="bg-white/20 hover:bg-white/30 backdrop-blur text-white px-3 py-3 rounded-xl shadow-inner border border-white/10 transition-colors shrink-0 flex items-center justify-center">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                </button>
                <input type="text" id="chat-input" placeholder="與 Polo 對話..." class="flex-1 bg-white/20 text-white placeholder-white/60 px-4 py-3 rounded-xl border border-white/10 focus:outline-none focus:border-white/30 focus:bg-white/30 shadow-inner text-base transition-colors font-medium" />
                <button id="send-btn" class="bg-blue-600/80 hover:bg-blue-500/80 active:scale-95 text-white px-5 py-3 rounded-xl shadow transition-all duration-150 font-bold text-base shrink-0">發送</button>
            </div>
        </div>

        <div class="flex justify-between items-end w-full">
            <div class="hidden bg-gray-900/70 backdrop-blur-md text-white p-4 rounded-xl shadow-xl border border-gray-700/50 max-w-xs pointer-events-auto flex-col gap-3 md:flex">
                <div class="flex items-center justify-between">
                    <h1 class="text-lg font-bold text-blue-400">AI 虛擬助教</h1>
                    <div id="status-light" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]"></div>
                </div>
                <p class="text-xs text-gray-300">已載入您的專屬 VRM 模型。</p>
                <div id="loading-status" class="mt-3 text-xs text-yellow-400 flex items-center justify-center">
                    <svg class="animate-spin -ml-1 mr-2 h-3 w-3 text-yellow-400" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    模型正在渲染中...
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';

        if (!THREE.ColorManagement) { THREE.ColorManagement = { enabled: true }; }

        let scene, camera, renderer, controls, currentVrm, particles;
        const clock = new THREE.Clock();
        let isSpeaking = false;
        let lipSyncTimer = 0;
        let conversationHistory = [];

        async function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0f1a);
            scene.fog = new THREE.Fog(0x0a0f1a, 5, 20);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.4, -1.2); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.outputColorSpace = THREE.SRGBColorSpace;
            container.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.target.set(0, 1.3, 0);
            controls.enableDamping = true;
            controls.update();

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);
            const spotLight = new THREE.SpotLight(0xffffff, 2.5);
            spotLight.position.set(2, 4, -3);
            spotLight.castShadow = true;
            scene.add(spotLight);

            const rimLight = new THREE.DirectionalLight(0x4488ff, 1.5);
            rimLight.position.set(-2, 2, 2);
            scene.add(rimLight);

            createParticles();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            loadVRM('AvatarSample_M.vrm');
            animate();
        }

        function createParticles() {
            const particleCount = 200;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = (Math.random() - 0.5) * 10;
                positions[i * 3 + 1] = Math.random() * 5;
                positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
                colors[i * 3] = 0.5 + Math.random() * 0.5;
                colors[i * 3 + 1] = 0.7 + Math.random() * 0.3;
                colors[i * 3 + 2] = 1.0;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.04,
                vertexColors: true,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function loadVRM(url) {
            const loader = new GLTFLoader();
            loader.register((parser) => new VRMLoaderPlugin(parser));

            loader.load(
                url,
                (gltf) => {
                    const vrm = gltf.userData.vrm;
                    VRMUtils.removeUnnecessaryVertices(gltf.scene);
                    VRMUtils.removeUnnecessaryJoints(gltf.scene);
                    vrm.scene.rotation.y = Math.PI;
                    scene.add(vrm.scene);
                    currentVrm = vrm;
                    document.getElementById('loading-status').classList.add('hidden');
                    
                    if (vrm.expressionManager) {
                        vrm.expressionManager.setValue('happy', 0.5);
                    }
                },
                null,
                (error) => console.error('VRM Loading Error:', error)
            );
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const elapsedTime = clock.elapsedTime;
            
            if (particles) {
                const positions = particles.geometry.attributes.position.array;
                for (let i = 0; i < positions.length; i += 3) {
                    positions[i + 1] += delta * 0.1;
                    positions[i] += Math.sin(elapsedTime + i) * 0.001;
                    if (positions[i + 1] > 5) positions[i + 1] = 0;
                }
                particles.geometry.attributes.position.needsUpdate = true;
                particles.rotation.y += delta * 0.02;
            }

            if (currentVrm) {
                if (currentVrm.humanoid) {
                    const chest = currentVrm.humanoid.getNormalizedBoneNode('chest');
                    if (chest) chest.rotation.x = Math.sin(elapsedTime * 1.2) * 0.01;
                }

                if (isSpeaking && currentVrm.expressionManager) {
                    lipSyncTimer += delta * 12;
                    const mouthValue = (Math.sin(lipSyncTimer) + 1) / 2;
                    currentVrm.expressionManager.setValue('aa', mouthValue * 0.8);
                } else if (currentVrm.expressionManager) {
                    currentVrm.expressionManager.setValue('aa', 0);
                }

                currentVrm.update(delta);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            const bubble = document.getElementById('chat-bubble');
            const chatText = document.getElementById('chat-text');
            bubble.classList.remove('hidden');
            chatText.innerText = "思考中...";

            const apiKey = ""; 
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text }] }],
                        systemInstruction: { parts: [{ text: "你是一個 AI 助教 Polo。請簡短回答。" }] }
                    })
                });
                const data = await response.json();
                const reply = data.candidates[0].content.parts[0].text;
                chatText.innerText = reply;
                speak(reply);
            } catch (e) {
                chatText.innerText = "連線失敗。";
            }
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'zh-TW';
            utterance.onstart = () => { isSpeaking = true; };
            utterance.onend = () => { isSpeaking = false; };
            window.speechSynthesis.speak(utterance);
        }

        document.getElementById('send-btn').addEventListener('click', sendMessage);
        document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

        init();
    </script>
</body>
</html>
