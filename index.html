<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 虛擬助教</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0b0f17;
            color: #e5e7eb;
            touch-action: none;
        }

        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 0; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .pointer-events-auto { pointer-events: auto; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

<body>

<div id="canvas-container"></div>

<div id="ui-layer" class="flex flex-col justify-end p-4 relative">

    <div class="absolute bottom-6 left-1/2 transform -translate-x-1/2 w-[calc(100%-2rem)] sm:w-full max-w-lg pointer-events-auto flex flex-col gap-3 
    bg-black/40 backdrop-blur-md p-4 rounded-2xl shadow-lg border border-white/10">

        <div id="chat-bubble" class="hidden px-2 max-h-40 overflow-y-auto no-scrollbar">
            <p id="chat-text" class="text-base text-gray-100 leading-relaxed"></p>
        </div>

        <div class="flex gap-2 w-full">

        
            <button id="mic-btn"
                class="bg-white/10 hover:bg-white/20 text-gray-200 px-3 py-3 rounded-xl border border-white/10 transition flex items-center justify-center">
                
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 1v11m0 0a4 4 0 004-4V5a4 4 0 10-8 0v3a4 4 0 004 4zm0 0v4m0 0h-3m3 0h3"/>
                </svg>

            </button>

            <input type="text" id="chat-input"
                placeholder="與角色對話..."
                class="flex-1 bg-white/5 text-gray-100 placeholder-gray-400 px-4 py-3 rounded-xl border border-white/10 focus:outline-none focus:border-blue-400 focus:bg-white/10 transition" />

            <button id="send-btn"
                class="bg-blue-600 hover:bg-blue-500 active:scale-95 text-white px-5 py-3 rounded-xl transition font-bold">
                發送
            </button>
        </div>
    </div>

</div>

<script type="module">
import * as THREE from 'three';

let scene, camera, renderer;

function init() {
    const container = document.getElementById('canvas-container');

    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0b0f17);
    scene.fog = new THREE.Fog(0x0b0f17, 10, 40);

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 1.5, -2);

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);

    container.appendChild(renderer.domElement);

    const ambient = new THREE.HemisphereLight(0x666677, 0x111122, 1);
    scene.add(ambient);

    const light = new THREE.DirectionalLight(0xffffff, 1.2);
    light.position.set(2, 4, 2);
    scene.add(light);

    animate();
}

function animate() {
    requestAnimationFrame(animate);
    renderer.render(scene, camera);
}

init();
</script>

</body>
</html>
